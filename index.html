<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillmatch - Sistema de compatibilidade</title>
    <link rel="stylesheet" href="./assets/styles/index.style.css">
    <meta name="description" content="Site do projeto Skillmatch">
</head>

<body>
    <header>
        <h1>Sistema Skillmatch</h1>
        <img src="./assets/img/papelada.png" alt="Ícone de papelada" style="height: 100px; max-width: 100%;">
        <nav>
            <img src="./assets/img/definicoes.svg"
            alt="Ícone de engrenagem" style="height: 30px; max-width: 100%;">
            <a href="#titleForm" tabindex="0" aria-label="Menu: Área de Formulário">Formulário</a>
            <a href="" aria-label="Menu: Área de">dawkdoawod</a>
            <a href="" aria-label="Menu: Área de">dawkdoawod</a>
            <a href="" aria-label="Menu: Área de">dawkdoawod</a>
        </nav>
    </header>

    <main>
        <section>
            <form method="post" id="FormCandidato">
                <h2 id="titleForm">Formulário</h2>
                <label for="CampoNome" aria-label="Formulário: Insira o seu nome">
                    <ul>
                        <li><input type="text" value="" name="CampoNome" id="CampoNome" placeholder="Insira o seu nome" required min="3" max="80"></li>
                    </ul>
                </label>
                <label for="CampoArea" aria-label="Formulário: Insira a sua área profissional">
                    <ul>
                        <li><input type="text" value="" name="CampoArea" id="CampoArea" placeholder="Insira a sua área profissional" required min="4" max="30"></li>
                    </ul>
                </label>
                <label for="CampoHabilidades" aria-label="Formulário: Insira as suas habilidades profissionais">
                    <ul>
                        <li><input type="text" value="" name="CampoHabilidades" id="CampoHabilidades" placeholder="Insira as suas habilidades profissionais" required min="4" max="50"></li>
                    </ul>
                </label>
                <label for="CampoAnos" aria-label="Formulário: Insira os seus anos de experiência">
                    <ul>
                        <li><input type="number" value="0" name="CampoAnos" id="CampoAnos" placeholder="Anos de experiência" required min="0" max="99"></li>
                    </ul>
                </label>
                <button type="submit" id="SubmitCandidato">Enviar</button>
            </form>
            <div id="respostaHTML">
                <p class="" id="textoHTML"></p>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="/assets/scripts/ui.js"></script>

</body>

</html>
